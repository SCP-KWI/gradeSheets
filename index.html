<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notenblätter erstellen</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main>
    <h1>📄 Notenblätter erstellen</h1>
    <p class="lead">Punktetabelle hochladen → ein A5-Notenblatt pro Schüler:in als PDF.</p>

    <form id="form">
      <div class="field">
        <label for="file">Punktetabelle (.xlsx / .ods)</label>
        <input type="file" id="file" accept=".xlsx,.xls,.ods,.csv" required>
        <p class="hint" id="fileInfo"></p>
      </div>

      <div class="field">
        <label for="examName">Prüfungsname</label>
        <input type="text" id="examName" placeholder="z. B. Prüfung Informatik" required>
      </div>

      <div class="field">
        <label for="subtitle">Untertitel <span class="opt">(optional)</span></label>
        <input type="text" id="subtitle" placeholder="z. B. Klasse 1d, Modul Digitale Daten 1">
      </div>

      <div class="row">
        <div class="field">
          <label for="date">Datum</label>
          <input type="date" id="date" required>
        </div>
        <div class="field">
          <label for="grade6">Punkte für Note 6 <span class="opt">(optional, Fusszeile)</span></label>
          <input type="number" id="grade6" step="any" min="0.5" placeholder="z. B. 18">
          <p class="hint" id="grade6Hint"></p>
        </div>
      </div>

      <button type="submit" id="submit">PDF erstellen &amp; herunterladen</button>
    </form>

    <div id="status" class="status" hidden></div>
    <div id="preview" class="preview" hidden></div>
  </main>

  <script src="js/xlsx.full.min.js"></script>
  <script src="js/pdfmake.min.js"></script>
  <script src="js/vfs_fonts.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
